from: markdown
to: pdf
#pdf-engine: xelatex
pdf-engine: latexmk
pdf-engine-opts:
  - -xelatex
  - -interaction=nonstopmode

# If your makepdf.sh already passes --toc, keep this false/omitted here.
# toc: true
toc-depth: 2

number-sections: true
top-level-division: chapter

variables:
  documentclass: scrbook
  classoption:
    - openany
    - oneside
  fontsize: 11pt
  geometry: a4paper,margin=25mm
  colorlinks: true
  linkcolor: careitblue
  urlcolor: careitblue
  citecolor: careitblue