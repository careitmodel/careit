<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

  <style>
    .grid { stroke: #d0d6dc; stroke-width: 1; fill: none; }
    .axis { stroke: #9aa7b3; stroke-width: 1.2; }
    .label { font-family: Arial, sans-serif; font-size: 18px; fill: #2b2b2b; text-anchor: middle; }
    .profile { fill: rgba(31,78,121,0.25); stroke: #1F4E79; stroke-width: 3; }
  </style>

  <!-- Center -->
  <g transform="translate(400,400)">

    <!-- Grid circles -->
    <circle r="80" class="grid"/>
    <circle r="160" class="grid"/>
    <circle r="240" class="grid"/>
    <circle r="320" class="grid"/>

    <!-- Axes -->
    <line x1="0" y1="0" x2="0" y2="-320" class="axis"/>
    <line x1="0" y1="0" x2="226" y2="-226" class="axis"/>
    <line x1="0" y1="0" x2="320" y2="0" class="axis"/>
    <line x1="0" y1="0" x2="226" y2="226" class="axis"/>
    <line x1="0" y1="0" x2="0" y2="320" class="axis"/>
    <line x1="0" y1="0" x2="-226" y2="226" class="axis"/>
    <line x1="0" y1="0" x2="-320" y2="0" class="axis"/>
    <line x1="0" y1="0" x2="-226" y2="-226" class="axis"/>

    <!-- Profile polygon (example values) -->
    <polygon class="profile"
      points="
        0,-260
        180,-180
        250,0
        150,150
        0,220
        -120,120
        -200,0
        -180,-180
      "/>
  </g>

  <!-- Labels -->
  <text x="400" y="50" class="label">P1</text>
  <text x="650" y="170" class="label">P2</text>
  <text x="740" y="410" class="label">P3</text>
  <text x="650" y="650" class="label">P4</text>
  <text x="400" y="760" class="label">P5</text>
  <text x="150" y="650" class="label">P6</text>
  <text x="60" y="410" class="label">P7</text>
  <text x="150" y="170" class="label">P8</text>

</svg>